<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Flan Market</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #ff6600;
      padding: 15px;
      text-align: center;
      color: white;
      font-size: 24px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }
  
    .product {
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      padding: 15px;
      text-align: center;
    }

    .product img {
      width: 100%;
      border-radius: 10px;
      height: 200px;
      object-fit: cover;
    }

    .product h3 {
      margin: 10px 0 5px;
    }

    .product p {
      color: #555;
    }

    .product button {
      background-color: #28a745;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    .product button:hover {
      background-color: #218838;
    }
  </style>
</head>
<body>

  <header>Flan Market - متجر الفلان المغربي 🎂</header>

  <div class="container">

    <div class="product">
      <img src="https://upload.wikimedia.org/wikipedia/commons/9/90/Flan.jpg" alt="Flan 1">
      <h3>Flan Classic</h3>
      <p>ثمن: 20 درهم</p>
      <button>أشري دابا</button>
    </div>

    <div class="product">
      <img src="https://www.saudigazette.com.sa/uploads/images/2022/09/06/1898024.jpeg" alt="Flan Chocolat">
      <h3>Flan بشكلاط</h3>
      <p>ثمن: 25 درهم</p>
      <button>أشري دابا</button>
    </div>

    <div class="product">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/Creme_caramel_001.jpg/800px-Creme_caramel_001.jpg" alt="Flan Caramel">
      <h3>Flan بالكراميل</h3>
      <p>ثمن: 30 درهم</p>
      <button>أشري دابا</button>
    </div>

  </div>

</body>
</html>
